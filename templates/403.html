{% extends 'base.html' %}
{% block title %}403 - Forbidden{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <h1 class="display-1 fw-bold text-danger mb-4" style="font-size: 8rem; opacity: 0.2;">403</h1>
            <h2 class="h1 fw-bold mb-3">Permission Denied</h2>
            <p class="lead text-muted mb-5">Access restricted. You do not have the required permissions to view this resource.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/" class="btn btn-outline-secondary btn-lg px-4">Homepage</a>
                <a href="{% url 'login' %}" class="btn btn-accent btn-lg px-4">Switch Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
