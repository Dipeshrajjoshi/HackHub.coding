{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Reset Password - HackHub-Code{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="auth-logo bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-key-fill fs-3"></i>
                            </div>
                            <h2 class="auth-title h3 fw-bold">Forgot Password?</h2>
                            <p class="auth-subtitle text-muted">Enter your email address and we'll send you a link to reset your password.</p>
                        </div>
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm mt-3">Send Reset Link</button>
                        </form>
                        <div class="text-center mt-4">
                            <a href="{% url 'login' %}" class="text-decoration-none small text-primary fw-medium">
                                <i class="bi bi-arrow-left me-1"></i> Back to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
