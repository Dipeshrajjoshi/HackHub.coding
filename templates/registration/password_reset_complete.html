{% extends 'base.html' %}

{% block title %}Password Reset Complete - HackHub-Code{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <div class="auth-logo bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 60px; height: 60px;">
                            <i class="bi bi-check-circle-fill fs-3"></i>
                        </div>
                        <h2 class="auth-title h3 fw-bold">Password Reset!</h2>
                        <p class="auth-subtitle text-muted mb-4">Your password has been set. You may now log in with your new password.</p>
                        <a href="{% url 'login' %}" class="btn btn-primary w-100 rounded-pill shadow-sm">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
