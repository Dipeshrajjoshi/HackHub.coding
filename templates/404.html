{% extends 'base.html' %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <h1 class="display-1 fw-bold text-accent mb-4" style="font-size: 8rem; opacity: 0.2;">404</h1>
            <h2 class="h1 fw-bold mb-3">Page Not Found</h2>
            <p class="lead text-muted mb-5">The road to code has ended here. The page you are looking for might have been removed or is temporarily unavailable.</p>
            <a href="/" class="btn btn-accent btn-lg px-5">Back to Homepage</a>
        </div>
    </div>
</div>
{% endblock %}
