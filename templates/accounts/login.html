{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login - HackHub-Code{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="auth-title">Welcome Back</h2>
                            <p class="auth-subtitle">Sign in to HackHub-Code</p>
                        </div>
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill">Sign In</button>
                        </form>
                        <p class="text-center mt-3 mb-0">
                            <a href="{% url 'password_reset' %}" class="text-decoration-none small text-muted hover-primary">Forgot your password?</a>
                        </p>
                        <p class="text-center mt-3" style="color:var(--text-muted);">
                            Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary);">Sign
                                up</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
