{% extends 'base.html' %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 py-5">
            <h1 class="display-1 fw-bold text-warning mb-4" style="font-size: 8rem; opacity: 0.2;">500</h1>
            <h2 class="h1 fw-bold mb-3">Internal Server Error</h2>
            <p class="lead text-muted mb-5">Our servers are having a bit of a moment. We've been notified and are working to resolve the issue as quickly as possible.</p>
            <a href="/" class="btn btn-accent btn-lg px-5">Refresh & Try Again</a>
        </div>
    </div>
</div>
{% endblock %}
