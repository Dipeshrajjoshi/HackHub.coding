{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Contact Us - HACKHUB-CODE{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <!-- decorative header with envelope icon -->
            <div class="text-center mb-5">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width:80px; height:80px;">
                    <i class="bi bi-envelope-heart text-primary fs-1"></i>
                </div>
                <h1 style="font-weight:800; letter-spacing:-0.5px;">Get in Touch</h1>
                <p class="text-muted">Have a question or feedback? We'd love to hear from you. Our team will respond as soon as possible.</p>
            </div>

            <!-- main contact form inside a glassmorphic card -->
            <div class="card p-4 shadow-lg border-0" style="background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05) !important;">
                <form method="post">
                    {% csrf_token %}
                    <!-- using django-crispy-forms to handle the labels and errors automatically -->
                    <div class="contact-form-inner">
                        {{ form|crispy }}
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">
                            <i class="bi bi-send-fill me-2"></i>Send Message
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
